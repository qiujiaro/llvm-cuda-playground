services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: llvm-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: llvm-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
